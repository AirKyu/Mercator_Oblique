<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mercator Oblique - Pro Performance</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: sans-serif; overflow: hidden; }
        #globe-box {
            position: absolute; top: 20px; left: 20px;
            width: 180px; height: 180px;
            border: 2px solid #38bdf8; border-radius: 50%;
            background: #000; z-index: 50; overflow: hidden;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(15, 23, 42, 0.9); padding: 12px;
            border-radius: 8px; border: 1px solid #1e293b; z-index: 50;
            font-size: 0.75rem; pointer-events: none;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #mC { z-index: 1; }
    </style>
</head>
<body>

<div id="globe-box"><canvas id="gC" width="180" height="180"></canvas></div>
<div id="ui">🚀 <b>Mode Performance HD</b> | Flèches & A/E | Molette Zoom</div>
<canvas id="mC"></canvas>

<script>
    const mCanvas = d3.select("#mC");
    const mCtx = mCanvas.node().getContext("2d", { alpha: false }); // Optimisation : pas de transparence alpha
    const gCanvas = d3.select("#gC");
    const gCtx = gCanvas.node().getContext("2d");

    let world = null;
    let rotation = [0, 0, 0];
    let scale = 350;
    let needsUpdate = true; // Flag pour savoir s'il faut redessiner
    const dpr = window.devicePixelRatio || 1;

    const projM = d3.geoMercator();
    const projG = d3.geoOrthographic().clipAngle(90).scale(88).translate([90, 90]);
    const pathM = d3.geoPath(projM, mCtx);
    const pathG = d3.geoPath(projG, gCtx);

    // Chargement HD 50m
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(data => {
        world = topojson.feature(data, data.objects.countries);
        resize();
        requestAnimationFrame(gameLoop); // Lancement de la boucle fluide
    });

    // BOUCLE DE RENDU 60 FPS
    function gameLoop() {
        if (needsUpdate && world) {
            render();
            needsUpdate = false;
        }
        requestAnimationFrame(gameLoop);
    }

    function render() {
        const w = window.innerWidth, h = window.innerHeight;
        projM.scale(scale).translate([w/2, h/2]).rotate(rotation);
        projG.rotate(rotation);

        // --- MERCATOR ---
        mCtx.fillStyle = "#020617";
        mCtx.fillRect(0, 0, w, h);

        // Grille (On dessine moins de lignes pour gagner en fluidité)
        mCtx.beginPath(); pathM(d3.geoGraticule().step([20, 20])());
        mCtx.strokeStyle = "rgba(148, 163, 184, 0.1)"; mCtx.lineWidth = 0.5; mCtx.stroke();

        // Pays HD
        mCtx.beginPath(); pathM(world);
        mCtx.fillStyle = "#1e293b"; mCtx.fill();
        mCtx.strokeStyle = "#334155"; mCtx.lineWidth = 0.8; mCtx.stroke();

        // Equateur Rouge (Haute priorité)
        mCtx.beginPath();
        pathM({type: "LineString", coordinates: Array.from({length: 181}, (_, i) => [i*2 - 180, 0])});
        mCtx.strokeStyle = "#ef4444"; mCtx.lineWidth = 3;
        mCtx.shadowBlur = 8; mCtx.shadowColor = "#ef4444";
        mCtx.stroke(); mCtx.shadowBlur = 0;

        // --- GLOBE ---
        gCtx.clearRect(0, 0, 180, 180);
        gCtx.beginPath(); gCtx.arc(90, 90, 88, 0, Math.PI*2);
        gCtx.fillStyle = "#0f172a"; gCtx.fill();
        
        gCtx.beginPath(); pathG(world);
        gCtx.fillStyle = "#1e293b"; gCtx.fill();
        gCtx.strokeStyle = "#334155"; gCtx.stroke();

        gCtx.beginPath();
        pathG({type: "LineString", coordinates: Array.from({length: 91}, (_, i) => [i*4 - 180, 0])});
        gCtx.strokeStyle = "#ef4444"; gCtx.lineWidth = 2; gCtx.stroke();
    }

    // Gestion du clavier ultra-réactive
    const keys = {};
    window.addEventListener("keydown", e => { keys[e.key] = true; updateLogic(); });
    window.addEventListener("keyup", e => { keys[e.key] = false; });

    function updateLogic() {
        const s = 4;
        if(keys["ArrowLeft"])  { rotation[0] -= s; needsUpdate = true; }
        if(keys["ArrowRight"]) { rotation[0] += s; needsUpdate = true; }
        if(keys["ArrowUp"])    { rotation[1] += s; needsUpdate = true; }
        if(keys["ArrowDown"])  { rotation[1] -= s; needsUpdate = true; }
        if(keys["a"] || keys["A"]) { rotation[2] -= s; needsUpdate = true; }
        if(keys["e"] || keys["E"]) { rotation[2] += s; needsUpdate = true; }
        if(Object.values(keys).some(v => v)) requestAnimationFrame(updateLogic);
    }

    window.addEventListener("wheel", e => {
        scale *= (e.deltaY > 0 ? 0.94 : 1.06);
        needsUpdate = true;
    }, {passive:true});

    function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        mCanvas.attr("width", w * dpr).attr("height", h * dpr).style("width", w + "px").style("height", h + "px");
        mCtx.scale(dpr, dpr);
        gCanvas.attr("width", 180 * dpr).attr("height", 180 * dpr).style("width", "180px").style("height", "180px");
        gCtx.scale(dpr, dpr);
        needsUpdate = true;
    }

    window.addEventListener("resize", resize);
</script>
</body>
</html>
