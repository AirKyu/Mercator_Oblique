<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mercator Oblique & Globe Controller</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #020617; overflow: hidden; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; width: 260px; background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 12px; z-index: 100; border: 1px solid #38bdf8; backdrop-filter: blur(8px); }
        #globe-container { position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; background: #000; border-radius: 50%; border: 2px solid #38bdf8; z-index: 100; cursor: grab; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); }
        .stats { font-family: monospace; font-size: 0.75rem; color: #34d399; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .kbd-hint { font-size: 0.7rem; color: #94a3b8; margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px; }
        kbd { background: #334155; padding: 2px 4px; border-radius: 4px; border: 1px solid #475569; }
        canvas { display: block; }
        #mapCanvas { cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0; font-size: 1rem; color: #38bdf8;">🌍 Mercator Oblique v14</h2>
    <div class="stats">
        <div>LON: <span id="v-lon">0</span>°</div>
        <div>LAT: <span id="v-lat">0</span>°</div>
        <div>ROLL: <span id="v-rol">0</span>°</div>
        <div>ZOOM: <span id="v-zom">100</span>%</div>
    </div>
    <div class="kbd-hint">
        • <kbd>↑↓←→</kbd> : Déplacement relatif écran<br>
        • <kbd>A</kbd> / <kbd>E</kbd> : Rotation (Roll)<br>
        • <kbd>Droit</kbd> : Centrer sur point
    </div>
</div>

<div id="globe-container">
    <canvas id="globeCanvas"></canvas>
</div>

<canvas id="mapCanvas"></canvas>

<script>
    const mapCtx = d3.select("#mapCanvas").node().getContext("2d");
    const globeCtx = d3.select("#globeCanvas").node().getContext("2d");
    
    let worldData = null;
    let rotation = [0, 0, 0]; // [Longitude, Latitude, Roll]
    let scale = 250;

    const projM = d3.geoMercator();
    const projG = d3.geoOrthographic().clipAngle(90);
    const pathM = d3.geoPath(projM, mapCtx);
    const pathG = d3.geoPath(projG, globeCtx);

    // Initialisation & Chargement
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
        worldData = topojson.feature(data, data.objects.countries);
        resize();
        render();
    });

    /**
     * LE CŒUR DE LA CORRECTION : Mouvement relatif à l'écran
     * On utilise le Roll (rotation[2]) pour corriger le vecteur de déplacement.
     */
    function moveRelative(dx, dy) {
        const gamma = rotation[2] * Math.PI / 180;
        const s = 65 / scale; // Vitesse proportionnelle au zoom

        // Matrice de rotation inverse : adapte dx/dy à l'inclinaison de la carte
        const dLon = dx * Math.cos(gamma) + dy * Math.sin(gamma);
        const dLat = -dx * Math.sin(gamma) + dy * Math.cos(gamma);

        rotation[0] += dLon * s;
        rotation[1] = Math.max(-89.9, Math.min(89.9, rotation[1] + dLat * s));
        render();
    }

    function render() {
        const w = window.innerWidth, h = window.innerHeight;
        
        // 1. Mise à jour de Mercator
        projM.scale(scale).translate([w/2, h/2]).rotate(rotation);
        mapCtx.fillStyle = "#020617"; mapCtx.fillRect(0,0,w,h);
        
        // Fond sphérique
        mapCtx.beginPath(); pathM({type:"Sphere"}); mapCtx.fillStyle="#0f172a"; mapCtx.fill();
        drawContent(mapCtx, pathM);

        // 2. Mise à jour du Globe (contrôleur)
        projG.scale(108).translate([110, 110]).rotate(rotation);
        globeCtx.clearRect(0,0,220,220);
        globeCtx.beginPath(); globeCtx.arc(110,110,108,0,Math.PI*2); globeCtx.fillStyle="#0f172a"; globeCtx.fill();
        drawContent(globeCtx, pathG);
        
        // Contour du globe
        globeCtx.beginPath(); globeCtx.arc(110,110,108,0,Math.PI*2); globeCtx.strokeStyle="#38bdf8"; globeCtx.stroke();

        updateUI();
    }

    function drawContent(ctx, p) {
        // Grille
        ctx.beginPath(); p(d3.geoGraticule()());
        ctx.strokeStyle = "rgba(148, 163, 184, 0.1)"; ctx.lineWidth = 0.5; ctx.stroke();

        // Pays
        if (worldData) {
            ctx.beginPath(); p(worldData);
            ctx.fillStyle = "#1e293b"; ctx.fill();
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 1; ctx.stroke();
        }

        // Équateur & Tropiques
        drawLine(ctx, p, 0, "#ef4444", 2); // Equator
        drawLine(ctx, p, 23.4, "#fb923c", 1.2, [4,4]); // Tropics
        drawLine(ctx, p, -23.4, "#fb923c", 1.2, [4,4]);
    }

    function drawLine(ctx, p, lat, col, lw, dash=[]) {
        ctx.beginPath(); ctx.setLineDash(dash);
        p({type:"LineString", coordinates:[[-180, lat], [180, lat]]});
        ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke();
        ctx.setLineDash([]);
    }

    // --- INTERACTIONS ---

    // Drag sur la carte (Mouvement relatif écran)
    d3.select("#mapCanvas").call(d3.drag().on("drag", e => moveRelative(e.dx, -e.dy)));

    // Drag sur le globe (Rotation directe)
    d3.select("#globeCanvas").call(d3.drag().on("drag", e => {
        const k = 70 / projG.scale();
        rotation[0] += e.dx * k;
        rotation[1] -= e.dy * k;
        render();
    }));

    // Clic droit : Centrer
    d3.select("#mapCanvas").on("contextmenu", e => {
        e.preventDefault();
        const p = projM.invert(d3.pointer(e));
        if (p) { rotation[0] = -p[0]; rotation[1] = -p[1]; render(); }
    });

    // Zoom & Clavier
    window.addEventListener("wheel", e => {
        e.preventDefault(); scale *= (e.deltaY > 0 ? 0.9 : 1.1);
        scale = Math.max(100, Math.min(10000, scale)); render();
    }, {passive:false});

    window.addEventListener("keydown", e => {
        const s = 10;
        switch(e.key) {
            case "ArrowLeft":  moveRelative(-s, 0); break;
            case "ArrowRight": moveRelative(s, 0); break;
            case "ArrowUp":    moveRelative(0, s); break;
            case "ArrowDown":  moveRelative(0, -s); break;
            case "a": case "A": rotation[2] -= 5; render(); break;
            case "e": case "E": rotation[2] += 5; render(); break;
        }
    });

    function updateUI() {
        d3.select("#v-lon").text((-rotation[0]).toFixed(1));
        d3.select("#v-lat").text((-rotation[1]).toFixed(1));
        d3.select("#v-rol").text(rotation[2].toFixed(1));
        d3.select("#v-zom").text(Math.round(scale/2.5));
    }

    function resize() {
        d3.select("#mapCanvas").attr("width", window.innerWidth).attr("height", window.innerHeight);
        d3.select("#globeCanvas").attr("width", 220).attr("height", 220);
        render();
    }

    window.addEventListener("resize", resize);
</script>
</body>
</html>
