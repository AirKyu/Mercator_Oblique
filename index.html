<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mercator Oblique - Responsive & Touch</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; --panel: rgba(15, 23, 42, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Globe "Viseur" (Adaptatif) */
        #globe-box {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px;
            width: clamp(100px, 25vw, 180px); height: clamp(100px, 25vw, 180px);
            border: 1.5px solid var(--accent); border-radius: 50%;
            background: #000; z-index: 50; overflow: hidden;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        /* Panneau de Contrôle Réactif */
        #controls {
            position: absolute; bottom: env(safe-area-inset-bottom, 20px);
            left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 500px;
            background: var(--panel); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; gap: 12px;
        }

        .axis-row { display: flex; justify-content: space-around; align-items: center; }
        .axis-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .label { font-size: 0.6rem; color: var(--accent); font-weight: bold; }
        
        .btn-wrap { display: flex; gap: 8px; }
        .btn {
            width: 48px; height: 48px; background: #1e293b; border: 1px solid var(--accent);
            color: white; border-radius: 12px; font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: var(--accent); color: var(--bg); }

        #stats { font-family: monospace; font-size: 0.65rem; text-align: center; color: #34d399; opacity: 0.8; }

        /* Tablette et Desktop : Ajustement de l'UI */
        @media (min-width: 768px) {
            #controls { left: auto; right: 20px; transform: none; width: 300px; }
        }
    </style>
</head>
<body>

<div id="globe-box"><canvas id="gC"></canvas></div>

<div id="controls">
    <div id="stats">LON: 0° | LAT: 0° | ROLL: 0°</div>
    <div class="axis-row">
        <div class="axis-group">
            <span class="label">LON</span>
            <div class="btn-wrap">
                <button class="btn" onclick="rotate(0,-1)">-</button>
                <button class="btn" onclick="rotate(0,1)">+</button>
            </div>
        </div>
        <div class="axis-group">
            <span class="label">LAT</span>
            <div class="btn-wrap">
                <button class="btn" onclick="rotate(1,-1)">-</button>
                <button class="btn" onclick="rotate(1,1)">+</button>
            </div>
        </div>
        <div class="axis-group">
            <span class="label">ROLL</span>
            <div class="btn-wrap">
                <button class="btn" onclick="rotate(2,-1)">-</button>
                <button class="btn" onclick="rotate(2,1)">+</button>
            </div>
        </div>
    </div>
</div>

<canvas id="mC"></canvas>

<script>
    const mCanvas = d3.select("#mC"), mCtx = mCanvas.node().getContext("2d", {alpha: false});
    const gCanvas = d3.select("#gC"), gCtx = gCanvas.node().getContext("2d");
    
    let world = null, rotation = [0, 0, 0], scale = 300, needsUpdate = true;
    const dpr = window.devicePixelRatio || 1;

    // Moteurs de projection
    const projM = d3.geoMercator();
    const projG = d3.geoOrthographic().clipAngle(90);
    const pathM = d3.geoPath(projM, mCtx);
    const pathG = d3.geoPath(projG, gCtx);

    // --- LOGIQUE DE ZOOM TACTILE (PINCH) ---
    let lastPinchDist = 0;

    window.addEventListener("touchstart", e => {
        if (e.touches.length === 2) {
            lastPinchDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    }, {passive: false});

    window.addEventListener("touchmove", e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            const delta = dist / lastPinchDist;
            scale *= delta;
            scale = Math.max(100, Math.min(15000, scale));
            lastPinchDist = dist;
            needsUpdate = true;
        }
    }, {passive: false});

    // --- CHARGEMENT & RENDU ---
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(data => {
        world = topojson.feature(data, data.objects.countries);
        resize();
        requestAnimationFrame(loop);
    });

    function loop() {
        if (needsUpdate && world) { render(); needsUpdate = false; }
        requestAnimationFrame(loop);
    }

    function render() {
        const w = window.innerWidth, h = window.innerHeight;
        const gDim = gCanvas.node().width / dpr;

        projM.scale(scale).translate([w/2, h/2]).rotate(rotation);
        projG.scale(gDim/2 - 2).translate([gDim/2, gDim/2]).rotate(rotation);

        // Mercator
        mCtx.fillStyle = "#020617"; mCtx.fillRect(0,0,w,h);
        mCtx.beginPath(); pathM(d3.geoGraticule().step([30, 30])());
        mCtx.strokeStyle = "rgba(148, 163, 184, 0.1)"; mCtx.stroke();
        
        mCtx.beginPath(); pathM(world);
        mCtx.fillStyle = "#1e293b"; mCtx.fill();
        mCtx.strokeStyle = "#334155"; mCtx.lineWidth = 0.8; mCtx.stroke();

        // Equateur Rouge HD
        mCtx.beginPath();
        pathM({type: "LineString", coordinates: Array.from({length: 181}, (_, i) => [i*2 - 180, 0])});
        mCtx.strokeStyle = "#ef4444"; mCtx.lineWidth = 3; mCtx.stroke();

        // Globe
        gCtx.clearRect(0,0,gDim,gDim);
        gCtx.beginPath(); gCtx.arc(gDim/2, gDim/2, gDim/2-2, 0, Math.PI*2);
        gCtx.fillStyle = "#0f172a"; gCtx.fill();
        gCtx.beginPath(); pathG(world);
        gCtx.fillStyle = "#1e293b"; gCtx.fill();
        gCtx.strokeStyle = "#334155"; gCtx.stroke();
        
        updateStats();
    }

    window.rotate = function(axis, delta) {
        rotation[axis] += delta;
        needsUpdate = true;
    };

    function updateStats() {
        d3.select("#stats").text(`LON: ${(-rotation[0]).toFixed(0)}° | LAT: ${(-rotation[1]).toFixed(0)}° | ROLL: ${rotation[2].toFixed(0)}°`);
    }

    function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        const gBox = document.getElementById("globe-box").getBoundingClientRect();
        
        mCanvas.attr("width", w * dpr).attr("height", h * dpr).style("width", w + "px").style("height", h + "px");
        mCtx.scale(dpr, dpr);
        
        gCanvas.attr("width", gBox.width * dpr).attr("height", gBox.height * dpr).style("width", gBox.width + "px").style("height", gBox.height + "px");
        gCtx.scale(dpr, dpr);
        needsUpdate = true;
    }

    window.addEventListener("wheel", e => { scale *= (e.deltaY > 0 ? 0.92 : 1.08); needsUpdate = true; }, {passive:true});
    window.addEventListener("resize", resize);
</script>
</body>
</html>
