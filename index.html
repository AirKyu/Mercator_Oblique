<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Concepteur de Projection - Globe First</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        
        /* Section 1 : Le Studio Globe */
        #globe-studio {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid #38bdf8; position: relative;
        }

        #canvas-globe { cursor: grab; background: radial-gradient(circle, #0f172a 0%, #020617 100%); }
        
        /* Panel de contrôle */
        .controls {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.9); padding: 25px; border-radius: 15px;
            border: 1px solid #38bdf8; backdrop-filter: blur(10px); width: 220px;
        }

        .btn-project {
            background: #38bdf8; color: #020617; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%;
            font-size: 1rem; margin-top: 20px; transition: 0.3s;
        }
        .btn-project:hover { background: #7dd3fc; transform: scale(1.05); }

        /* Section 2 : Le Résultat Mercator */
        #mercator-result { min-height: 100vh; width: 100vw; padding: 40px 0; display: flex; flex-direction: column; align-items: center; }
        #canvas-mercator { background: #0f172a; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .roll-ui { display: flex; gap: 20px; margin-bottom: 10px; }
        .roll-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #38bdf8; background: transparent; color: #38bdf8; cursor: pointer; font-size: 1.5rem; }
        .roll-btn:hover { background: rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body>

<section id="globe-studio">
    <div class="controls">
        <h2 style="margin-top:0; color:#38bdf8;">1. Orientez le Globe</h2>
        <p style="font-size:0.8rem; color:#94a3b8;">Glissez pour pivoter.<br>Utilisez les flèches pour le Roll.</p>
        
        <div class="roll-ui">
            <button class="roll-btn" onclick="rotateRoll(-10)">↺</button>
            <button class="roll-btn" onclick="rotateRoll(10)">↻</button>
        </div>

        <div style="font-family: monospace; font-size:0.8rem; color:#34d399; margin: 10px 0;">
            λ: <span id="val-lon">0</span>°<br>
            φ: <span id="val-lat">0</span>°<br>
            γ: <span id="val-gamma">0</span>°
        </div>

        <button class="btn-project" onclick="generateMercator()">GÉNÉRER LA PROJECTION ↓</button>
    </div>
    
    <canvas id="canvas-globe"></canvas>
</section>

<section id="mercator-result">
    <h2 id="result-title">2. Projection de Mercator Oblique</h2>
    <canvas id="canvas-mercator"></canvas>
    <p style="color:#94a3b8; margin-top:20px;">Utilisez la molette sur la carte pour zoomer sur le résultat.</p>
</section>

<script>
    const gCanvas = d3.select("#canvas-globe");
    const gCtx = gCanvas.node().getContext("2d");
    const mCanvas = d3.select("#canvas-mercator");
    const mCtx = mCanvas.node().getContext("2d");

    let worldData = null;
    let rotation = [0, 0, 0]; // Longitude, Latitude, Roll
    let mScale = 250;

    const projGlobe = d3.geoOrthographic().clipAngle(90);
    const projMerc = d3.geoMercator();

    const pathG = d3.geoPath(projGlobe, gCtx);
    const pathM = d3.geoPath(projMerc, mCtx);

    // Initialisation
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
        worldData = topojson.feature(data, data.objects.countries);
        resize();
        renderGlobe();
    });

    function renderGlobe() {
        const w = window.innerWidth, h = window.innerHeight;
        projGlobe.scale(h/2.5).translate([w/2, h/2]).rotate(rotation);
        
        gCtx.clearRect(0, 0, w, h);
        
        // Sphère (Océan)
        gCtx.beginPath(); pathG({type: "Sphere"});
        gCtx.fillStyle = "#1e293b"; gCtx.fill();
        gCtx.strokeStyle = "#38bdf8"; gCtx.lineWidth = 2; gCtx.stroke();

        drawFeatures(gCtx, pathG);
        updateUI();
    }

    function generateMercator() {
        const w = window.innerWidth;
        const h = 800;
        mCanvas.attr("width", w).attr("height", h);
        
        projMerc.scale(mScale).translate([w/2, h/2]).rotate(rotation);
        
        mCtx.clearRect(0, 0, w, h);
        mCtx.fillStyle = "#0f172a"; mCtx.fillRect(0,0,w,h);
        
        drawFeatures(mCtx, pathM);

        // Scroll automatique vers le résultat
        document.getElementById('mercator-result').scrollIntoView({ behavior: 'smooth' });
    }

    function drawFeatures(ctx, pathGen) {
        // Grille
        ctx.beginPath(); pathGen(d3.geoGraticule()());
        ctx.strokeStyle = "rgba(148, 163, 184, 0.1)"; ctx.lineWidth = 0.5; ctx.stroke();

        // Pays
        if (worldData) {
            ctx.beginPath(); pathGen(worldData);
            ctx.fillStyle = "#334155"; ctx.fill();
            ctx.strokeStyle = "#475569"; ctx.stroke();
        }

        // Équateur
        ctx.beginPath(); ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2;
        pathGen({type: "LineString", coordinates: [[-180, 0], [180, 0]]}); ctx.stroke();

        // Tropiques
        ctx.beginPath(); ctx.strokeStyle = "#fb923c"; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
        pathGen({type: "LineString", coordinates: [[-180, 23.4], [180, 23.4]]});
        pathGen({type: "LineString", coordinates: [[-180, -23.4], [180, -23.4]]});
        ctx.stroke(); ctx.setLineDash([]);
    }

    // Interactions Globe
    gCanvas.call(d3.drag().on("drag", (e) => {
        const k = 70 / projGlobe.scale();
        rotation[0] += e.dx * k;
        rotation[1] -= e.dy * k;
        renderGlobe();
    }));

    // Zoom sur Mercator
    window.addEventListener("wheel", (e) => {
        if (window.scrollY > 500) { // Si on est sur la section Mercator
            mScale *= (e.deltaY > 0 ? 0.9 : 1.1);
            generateMercator();
        }
    });

    function rotateRoll(val) { rotation[2] += val; renderGlobe(); }

    function updateUI() {
        d3.select("#val-lon").text((-rotation[0]).toFixed(1));
        d3.select("#val-lat").text((-rotation[1]).toFixed(1));
        d3.select("#val-gamma").text(rotation[2].toFixed(1));
    }

    function resize() {
        gCanvas.attr("width", window.innerWidth).attr("height", window.innerHeight);
        renderGlobe();
    }

    window.addEventListener("resize", resize);
</script>
</body>
</html>
